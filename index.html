<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Watch Together</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Экран авторизации -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <div class="auth-title">🎬 Watch Together</div>
            <div class="auth-subtitle">Смотри видео с друзьями в реальном времени</div>
            
            <input type="text" class="input" id="usernameInput" placeholder="Твое имя">
            <button class="button" onclick="login()">Войти</button>
        </div>
    </div>

    <!-- Главный экран -->
    <div class="main-screen" id="mainScreen">
        <div class="navbar">
            <div class="logo">🎬 Watch Together</div>
            <div class="user-info">
                <div class="avatar" id="userAvatar"></div>
                <span id="username"></span>
            </div>
        </div>

        <div class="container">
            <div class="hero">
                <div class="hero-title">Создай комнату</div>
                <div class="hero-subtitle">Или присоединись к существующей</div>
            </div>

            <div class="rooms-grid">
                <div class="room-card create-room-card" onclick="createRoom()">
                    <div class="create-icon">➕</div>
                    <div>Создать комнату</div>
                </div>
                
                <div class="room-card" onclick="showJoinModal()">
                    <div class="room-code">Войти</div>
                    <div class="room-users">Введи код комнаты</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Экран комнаты -->
    <div class="room-screen" id="roomScreen">
        <div class="navbar">
            <div class="logo">🎬 Watch Together</div>
            <div class="user-info">
                <div class="avatar" id="roomUserAvatar"></div>
                <span id="roomUsername"></span>
            </div>
        </div>

        <div class="container">
            <div class="room-header">
                <div class="room-info">
                    <div class="room-code-display">Комната: <span id="currentRoom"></span></div>
                    <div class="room-users" id="roomUsers">👥 1 участник</div>
                </div>
                <button class="leave-button" onclick="leaveRoom()">Выйти</button>
            </div>

            <div class="content-wrapper">
                <div class="video-section">
                    <div class="source-selector" id="sourceSelector">
                        <div class="source-title">Выбери источник видео</div>
                        <div class="source-buttons">
                            <button class="source-btn" onclick="selectSource('youtube')">
                                <div class="source-icon">📺</div>
                                <div>YouTube</div>
                            </button>
                            <button class="source-btn" onclick="selectSource('url')">
                                <div class="source-icon">🔗</div>
                                <div>Ссылка</div>
                            </button>
                            <button class="source-btn" onclick="selectSource('file')">
                                <div class="source-icon">📁</div>
                                <div>Файл</div>
                            </button>
                        </div>
                        
                        <div class="source-input" id="youtubeInput" style="display: none;">
                            <input type="text" class="input" id="youtubeUrl" placeholder="Вставь ссылку на YouTube">
                            <button class="button" onclick="loadYoutube()">Загрузить</button>
                        </div>
                        
                        <div class="source-input" id="urlInput" style="display: none;">
                            <input type="text" class="input" id="videoUrl" placeholder="Прямая ссылка на видео (.mp4, .webm)">
                            <button class="button" onclick="loadUrl()">Загрузить</button>
                        </div>
                        
                        <div class="source-input" id="fileInput" style="display: none;">
                            <input type="file" class="file-input" id="videoFile" accept="video/*" onchange="loadFile()">
                            <label for="videoFile" class="button">Выбрать файл</label>
                        </div>
                    </div>
                    
                    <div class="video-container" id="videoContainer" style="display: none;">
                        <video id="video" controls style="display: none;"></video>
                        <iframe id="youtubePlayer" style="display: none;" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="chat-section">
                    <div class="chat-header">💬 Чат</div>
                    <div class="messages" id="messages"></div>
                    <div class="chat-input-container">
                        <input type="text" class="chat-input" id="messageInput" placeholder="Сообщение...">
                        <button class="send-button" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка для входа в комнату -->
    <div class="modal" id="joinModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-title">Войти в комнату</div>
            <input type="text" class="input" id="joinRoomCode" placeholder="Введи код комнаты">
            <button class="button" onclick="joinRoom()">Присоединиться</button>
            <button class="button button-secondary" onclick="closeJoinModal()">Отмена</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
